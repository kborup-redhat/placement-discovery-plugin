apiVersion: v1
kind: Service
metadata:
  name: {{ include "placement-discovery-plugin.fullname" . }}
  labels:
    {{- include "placement-discovery-plugin.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: {{ include "placement-discovery-plugin.fullname" . }}-cert
  {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "placement-discovery-plugin.selectorLabels" . | nindent 4 }}

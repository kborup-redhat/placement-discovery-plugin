apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "placement-discovery-plugin.fullname" . }}
  labels:
    {{- include "placement-discovery-plugin.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "placement-discovery-plugin.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from the OpenShift console namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-console
    ports:
    - protocol: TCP
      port: {{ .Values.service.targetPort }}
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow traffic to the Kubernetes API server
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443

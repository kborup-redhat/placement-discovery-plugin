apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "placement-discovery-plugin.fullname" . }}
  labels:
    {{- include "placement-discovery-plugin.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups: ["apps"]
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups: ["kubevirt.io"]
  resources:
  - virtualmachines
  - virtualmachineinstances
  verbs:
  - get
  - list
  - watch
- apiGroups: ["k8s.cni.cncf.io"]
  resources:
  - network-attachment-definitions
  verbs:
  - get
  - list
  - watch
